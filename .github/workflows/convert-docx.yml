name: Convert DOCX to Markdown

on:
  push:
    branches:
      - main

jobs:
  convert:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Run conversion script
        run: |
          chmod +x ./scripts/convert-docx.sh
          ./scripts/convert-docx.sh

      - name: Commit generated Markdown files
        env:
          GH_PAT: ${{ secrets.REPO_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git config --local user.name "GitHub Actions"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add *.md
          git commit -m "Convert DOCX files to Markdown" || echo "No changes to commit"
          git push origin "HEAD:${GITHUB_REF_NAME}" || echo "No changes to push"